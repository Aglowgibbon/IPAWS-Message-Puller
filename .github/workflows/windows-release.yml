name: Windows Build and Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build portable executable
        run: |
          pyinstaller --onefile --name ipaws-puller ipaws_puller.py

      - name: Optionally sign portable executable
        if: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 != '' && secrets.WINDOWS_CODESIGN_PASSWORD != '' }}
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_BASE64))
          signtool sign /fd SHA256 /f $pfxPath /p $env:CODESIGN_PASSWORD /tr http://timestamp.digicert.com /td SHA256 dist\ipaws-puller.exe

      - name: Prepare quick-start bundle
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-bundle | Out-Null
          Copy-Item dist\ipaws-puller.exe release-bundle\ipaws-puller.exe
          Copy-Item release\README-quick-start.md release-bundle\README-quick-start.md
          Compress-Archive -Path release-bundle\* -DestinationPath dist\ipaws-puller-bundle.zip -Force

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}".TrimStart("v") } else { "dev" }
          & $iscc "/DMyAppVersion=$version" installer\ipaws-puller.iss

      - name: Optionally sign installer executable
        if: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 != '' && secrets.WINDOWS_CODESIGN_PASSWORD != '' }}
        shell: pwsh
        env:
          CODESIGN_PFX_BASE64: ${{ secrets.WINDOWS_CODESIGN_PFX_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "codesign.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:CODESIGN_PFX_BASE64))
          signtool sign /fd SHA256 /f $pfxPath /p $env:CODESIGN_PASSWORD /tr http://timestamp.digicert.com /td SHA256 dist\ipaws-puller-setup.exe

      - name: Create release notes body
        shell: pwsh
        run: |
          @"
          ## Windows release artifacts

          - **Portable EXE:** `ipaws-puller.exe`
          - **Bundle ZIP:** `ipaws-puller-bundle.zip` (contains `ipaws-puller.exe` + quick-start guide)
          - **Installer:** `ipaws-puller-setup.exe`

          ## Supported OS

          - Windows 10 and Windows 11 (64-bit)

          ## Permissions and firewall considerations

          - The app makes outbound HTTPS requests to FEMA's IPAWS API endpoint.
          - If your environment blocks outbound traffic, allow HTTPS access to `www.fema.gov`.
          - Writing output files may require running in a directory where the user has write permission.
          "@ | Set-Content -Path dist\release-notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/ipaws-puller.exe
            dist/ipaws-puller-bundle.zip
            dist/ipaws-puller-setup.exe
